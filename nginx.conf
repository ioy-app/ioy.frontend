server {
    listen 80;
    server_name localhost;

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        root   /usr/share/nginx/html;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        rewrite ^/api(.*)$ $1 break;

        proxy_connect_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
        fastcgi_read_timeout 3600s;
        proxy_buffering off;
    }

    location /s3 {
      # Убираем префикс /s3 при проксировании на Console
      rewrite ^/s3(.*)$ $1 break;
      
      proxy_pass http://minio:9001;
      
      # Стандартные заголовки
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      
      # WebSocket поддержка (критично для Console)
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      
      # Таймауты для долгой работы сессии
      proxy_connect_timeout 3600s;
      proxy_send_timeout 3600s;
      proxy_read_timeout 3600s;
      
      # Отключаем буферизацию для корректной работы WebSocket
      proxy_buffering off;
      proxy_cache off;
      
      # Для корректной работы консольных редиректов
      proxy_redirect off;
    }
}