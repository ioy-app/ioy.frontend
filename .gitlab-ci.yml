stages:
  - test
  - build
  - test

Test:Components:
  stage: test
  tags:
    - shell
  script:
    - |
      #!/bin/bash
      npm i --force
      npm run test:components
  only:
    - master

Test:Components:
  stage: test
  tags:
    - shell
  script:
    - |
      #!/bin/bash
      npm i
      npm run test:components
  only:
    - master

Building:
  stage: build
  tags:
    - shell 
  script:
    - |
      #!/bin/bash
      npm i --force
      npm run build
      docker image prune -f
      docker build -t frontend .
      cd /opt/ioy.app
      docker compose up -d
  only:
    - master

Test:Components:
  stage: test
  tags:
    - shell
  script:
    - |
      #!/bin/bash
      npm i --force
      npm run test:components
  only:
    - master