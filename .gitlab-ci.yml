stages:
  - test
  - build

Test:Components:
  stage: test
  tags:
    - shell
  script:
    - |
      #!/bin/bash
      npm i
      npm run test:components
  only:
    - master
    - develop

Test:Units:
  stage: test
  tags:
    - shell
  script:
    - |
      #!/bin/bash
      npm i
      npm run build
      docker image prune -f
      docker build -t frontend:develop .
      docker compose up -f /opt/ioy.app/docker-compose.yml -d
      npm run test:units
  only:
    - master
    - develop

Building:
  stage: build
  tags:
    - shell 
  script:
    - |
      #!/bin/bash
      npm i
      npm run build
      docker image prune -f
      docker build -t frontend .
      cd /opt/ioy.app
      docker compose up -d
  only:
    - master