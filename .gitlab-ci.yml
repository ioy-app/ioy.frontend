Building:
  stage: build
  tags:
    - shell 
  script:
    - |
      #!/bin/bash
      cp $APP_ENV .env
      npm i
      npm run build
      docker image prune -f
      docker build -t frontend .
      cd /opt/ioy.app
      docker compose up -d
  only:
    - master